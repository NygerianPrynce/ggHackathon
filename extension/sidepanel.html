<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FReADY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --vu-gold: #CFAE70;
      --vu-gold-dark: #B8943E;
      --vu-dark: #0a0e12;
      --surface-card: rgba(18, 22, 32, 0.94);
      --text-primary: #E8F4FF;
      --text-muted: #8A9BB0;
      --danger: #FF6B6B;
      --success: #4ECDC4;
      --info: #74B9FF;
      --viz-gold-bright: #F0E4C4;
      --viz-gold: #CFAE70;
      --viz-gold-deep: #9A7B38;
      --viz-gold-shadow: rgba(207, 174, 112, 0.45);
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--vu-dark);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1rem;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 18%, rgba(207, 174, 112, 0.09) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(154, 123, 56, 0.05) 0%, transparent 45%),
        linear-gradient(180deg, #06090d 0%, #0a1018 100%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; }
    .card {
      background: var(--surface-card);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(207, 174, 112, 0.14);
      border-radius: var(--radius);
      padding: 1.5rem 1.25rem;
      box-shadow:
        0 0 40px rgba(207, 174, 112, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .brand h1 {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #E8D5A8, var(--vu-gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand p { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.35rem; }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(207, 174, 112, 0.2), transparent);
      margin: 1rem 0;
    }
    .viz-wrap {
      display: flex;
      justify-content: center;
      margin: 0.5rem 0 1rem;
    }
    .viz-mic-btn {
      position: relative;
      width: 220px;
      height: 220px;
      padding: 0;
      border: none;
      cursor: pointer;
      background: transparent;
      border-radius: 50%;
      display: block;
      transition: transform 0.2s ease, filter 0.25s ease;
    }
    .viz-mic-btn:hover { transform: scale(1.02); }
    .viz-mic-btn:focus-visible {
      outline: 2px solid var(--viz-gold);
      outline-offset: 4px;
    }
    .viz-mic-btn.recording {
      animation: viz-breathe 2.2s ease-in-out infinite;
    }
    @keyframes viz-breathe {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.06); }
    }
    .voice-viz-svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 0 22px var(--viz-gold-shadow));
    }
    .mic-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    #transcript {
      width: 100%;
      min-height: 72px;
      border-radius: 10px;
      border: 1px solid rgba(207, 174, 112, 0.15);
      background: rgba(0, 0, 0, 0.35);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.65rem 0.75rem;
      resize: vertical;
    }
    #transcript:focus { outline: none; border-color: rgba(207, 174, 112, 0.5); }
    #send-btn { display: none; }
    #question-banner {
      display: none;
      margin-top: 0.75rem;
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      background: rgba(116, 185, 255, 0.1);
      border: 1px solid rgba(116, 185, 255, 0.25);
      color: var(--info);
      font-size: 0.82rem;
      line-height: 1.45;
    }
    #question-banner.visible { display: block; }
    #status {
      margin-top: 0.85rem;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.25);
      color: var(--text-muted);
      min-height: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.35;
    }
    #status.listening { color: var(--viz-gold-bright); background: rgba(207, 174, 112, 0.12); }
    #status.working { color: var(--success); }
    #status.question { color: var(--info); }
    #status.done { color: var(--success); }
    #status.error { color: var(--danger); }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 0.35rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .voice-hint {
      margin-top: 0.75rem;
      font-size: 0.65rem;
      color: rgba(138, 155, 176, 0.55);
      text-align: center;
      line-height: 1.4;
    }
    #mute-btn {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      background: none;
      border: 1px solid rgba(207, 174, 112, 0.2);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 1rem;
      padding: 0.3rem 0.5rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      z-index: 2;
    }
    #mute-btn:hover { color: var(--vu-gold); border-color: var(--vu-gold); }
    #mute-btn.muted { color: var(--danger); border-color: var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <button type="button" id="mute-btn" title="Toggle voice">🔊</button>
      <div class="brand">
        <h1>FReADY</h1>
        <p>Speak your issue — we'll fill the form</p>
      </div>
      <div class="divider"></div>
      <div class="viz-wrap">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <button type="button" id="mic-btn" class="viz-mic-btn" aria-label="Tap to speak">
            <svg class="voice-viz-svg" viewBox="0 0 200 200" aria-hidden="true">
              <defs>
                <radialGradient id="viz-core-grad" cx="35%" cy="35%" r="65%">
                  <stop offset="0%" stop-color="#FFF9EC"/>
                  <stop offset="40%" stop-color="#E8D5A8"/>
                  <stop offset="100%" stop-color="#7A5E28"/>
                </radialGradient>
                <linearGradient id="viz-outer-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#F5E6C8"/>
                  <stop offset="45%" stop-color="#CFAE70"/>
                  <stop offset="100%" stop-color="#6B5420"/>
                </linearGradient>
                <linearGradient id="viz-mid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#F0E4C4"/>
                  <stop offset="100%" stop-color="#B8943E"/>
                </linearGradient>
                <filter id="viz-glow" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation="1.8" result="b"/>
                  <feMerge>
                    <feMergeNode in="b"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
                <filter id="viz-core-glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="2.5" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <path
                id="viz-outer"
                fill="rgba(55, 42, 18, 0.42)"
                stroke="url(#viz-outer-stroke)"
                stroke-width="1.5"
                filter="url(#viz-glow)"
                d=""
              />
              <g id="viz-mid" transform="translate(100,100)"></g>
              <g id="viz-core-group" transform="translate(100,100)">
                <circle r="26" fill="url(#viz-core-grad)" filter="url(#viz-core-glow)" opacity="0.95"/>
                <g id="viz-wireframe" fill="none" stroke="rgba(232, 213, 168, 0.42)" stroke-width="0.6">
                  <ellipse rx="26" ry="10" cx="0" cy="0" transform="rotate(0)"/>
                  <ellipse rx="26" ry="10" cx="0" cy="0" transform="rotate(60)"/>
                  <ellipse rx="26" ry="10" cx="0" cy="0" transform="rotate(120)"/>
                  <circle r="26" cx="0" cy="0" opacity="0.5"/>
                  <line x1="-18" y1="-12" x2="18" y2="12" opacity="0.4"/>
                  <line x1="18" y1="-12" x2="-18" y2="12" opacity="0.4"/>
                </g>
              </g>
            </svg>
          </button>
          <p class="mic-label" id="mic-label">Tap to speak</p>
        </div>
      </div>
      <textarea id="transcript" placeholder="Describe the issue you are facing with your voice..." rows="3" aria-label="Issue text"></textarea>
      <button type="button" id="send-btn" disabled>Send to FReADY</button>
      <div id="question-banner"></div>
      <div id="status">Ready — tap the mic</div>
      <p class="voice-hint" id="voice-mode-label">Type your issue or use the mic. Enter sends; Shift+Enter adds a line.</p>
    </div>
  </div>
  <script src="pipeline-debug.js"></script>
  <script src="normalize-transcript.js"></script>
  <script src="openai-secrets.js"></script>
  <script src="elevenlabs.js"></script>
  <script src="voice-visualizer.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
