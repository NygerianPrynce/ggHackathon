<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReADY Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --vu-gold: #CFAE70;
      --vu-gold-dark: #B8943E;
      --vu-dark: #111111;
      --surface-card: rgba(28, 28, 46, 0.92);
      --text-primary: #F0F0F5;
      --text-muted: #9A9AB0;
      --danger: #FF6B6B;
      --success: #4ECDC4;
      --info: #74B9FF;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--vu-dark);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1rem;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(207, 174, 112, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(78, 205, 196, 0.05) 0%, transparent 45%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; }
    .card {
      background: var(--surface-card);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(207, 174, 112, 0.12);
      border-radius: var(--radius);
      padding: 1.5rem 1.25rem;
      box-shadow: 0 0 32px rgba(207, 174, 112, 0.08);
    }
    .brand h1 {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #E8D5A8, var(--vu-gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand p { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.35rem; }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(207, 174, 112, 0.2), transparent);
      margin: 1rem 0;
    }
    .mic-wrap { display: flex; justify-content: center; margin: 1rem 0; }
    #mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, var(--vu-gold), var(--vu-gold-dark));
      color: #1c1c1c;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 4px 20px rgba(207, 174, 112, 0.28);
    }
    #mic-btn:hover { transform: scale(1.05); }
    #mic-btn.recording {
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    .mic-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.5rem; text-align: center; text-transform: uppercase; letter-spacing: 0.04em; }
    #transcript {
      width: 100%;
      min-height: 72px;
      border-radius: 10px;
      border: 1px solid rgba(207, 174, 112, 0.15);
      background: rgba(0, 0, 0, 0.35);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.65rem 0.75rem;
      resize: vertical;
    }
    #transcript:focus { outline: none; border-color: var(--vu-gold); }
    #send-btn {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.7rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.88rem;
      background: linear-gradient(135deg, var(--vu-gold), var(--vu-gold-dark));
      color: #1c1c1c;
    }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #question-banner {
      display: none;
      margin-top: 0.75rem;
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      background: rgba(116, 185, 255, 0.1);
      border: 1px solid rgba(116, 185, 255, 0.25);
      color: var(--info);
      font-size: 0.82rem;
      line-height: 1.45;
    }
    #question-banner.visible { display: block; }
    #status {
      margin-top: 0.85rem;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.25);
      color: var(--text-muted);
      min-height: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.35;
    }
    #status.listening { color: var(--vu-gold); background: rgba(207, 174, 112, 0.1); }
    #status.working { color: var(--success); }
    #status.question { color: var(--info); }
    #status.done { color: var(--success); }
    #status.error { color: var(--danger); }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 0.35rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .voice-hint {
      margin-top: 0.75rem;
      font-size: 0.65rem;
      color: rgba(154, 154, 176, 0.55);
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <h1>ReADY Bot</h1>
        <p>Speak your issue — we’ll fill the form</p>
      </div>
      <div class="divider"></div>
      <div class="mic-wrap">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <button type="button" id="mic-btn" aria-label="Tap to speak">🎙️</button>
          <p class="mic-label" id="mic-label">Tap to speak</p>
        </div>
      </div>
      <textarea id="transcript" placeholder="Transcript appears here…" rows="3" aria-label="Issue text"></textarea>
      <button type="button" id="send-btn" disabled><span>🚀</span> Send to bot</button>
      <div id="question-banner"></div>
      <div id="status">Ready — tap the mic</div>
      <p class="voice-hint" id="voice-mode-label">Voice: tap-to-speak (Web Speech). ElevenLabs: set <code>VoiceProvider.mode</code> in <code>sidepanel.js</code> when you add the SDK.</p>
    </div>
  </div>
  <script src="pipeline-debug.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
