<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Voice-powered maintenance request reporter for Vanderbilt ReADY" />
  <title>VU Maintenance Reporter</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       Design Tokens
       ═══════════════════════════════════════════ */
    :root {
      --vu-gold: #CFAE70;
      --vu-gold-light: #E8D5A8;
      --vu-gold-dark: #B8943E;
      --vu-black: #1C1C1C;
      --vu-dark: #111111;
      --surface: #1A1A2E;
      --surface-card: rgba(28, 28, 46, 0.85);
      --text-primary: #F0F0F5;
      --text-muted: #9A9AB0;
      --danger: #FF6B6B;
      --success: #4ECDC4;
      --info: #74B9FF;
      --radius: 16px;
      --shadow-glow: 0 0 40px rgba(207, 174, 112, 0.15);
    }

    /* ═══════════════════════════════════════════
       Reset & Base
       ═══════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--vu-dark);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(207, 174, 112, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(78, 205, 196, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(207, 174, 112, 0.04) 0%, transparent 50%);
      animation: bgShift 12s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgShift {
      0% {
        opacity: 0.6;
        transform: scale(1);
      }

      100% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    /* ═══════════════════════════════════════════
       Main Card
       ═══════════════════════════════════════════ */
    .card {
      position: relative;
      z-index: 1;
      width: 92%;
      max-width: 420px;
      background: var(--surface-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(207, 174, 112, 0.12);
      border-radius: var(--radius);
      padding: 2.5rem 2rem 2rem;
      box-shadow: var(--shadow-glow);
      text-align: center;
    }

    /* ═══════════════════════════════════════════
       Branding
       ═══════════════════════════════════════════ */
    .brand {
      margin-bottom: 0.25rem;
    }

    .brand h1 {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--vu-gold-light), var(--vu-gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      font-weight: 500;
    }

    /* ═══════════════════════════════════════════
       Divider
       ═══════════════════════════════════════════ */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(207, 174, 112, 0.2), transparent);
      margin: 1.25rem 0;
    }

    /* ═══════════════════════════════════════════
       Microphone Button
       ═══════════════════════════════════════════ */
    .mic-wrap {
      display: flex;
      justify-content: center;
      margin: 1.5rem 0;
    }

    #mic-btn {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, var(--vu-gold), var(--vu-gold-dark));
      color: var(--vu-black);
      font-size: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 24px rgba(207, 174, 112, 0.3);
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    #mic-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 32px rgba(207, 174, 112, 0.45);
    }

    #mic-btn:active {
      transform: scale(0.96);
    }

    /* Pulsing ring when recording */
    #mic-btn.recording {
      animation: pulse 1.2s ease-in-out infinite;
    }

    #mic-btn.recording::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2.5px solid var(--vu-gold);
      animation: ringPulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.07);
      }
    }

    @keyframes ringPulse {
      0% {
        transform: scale(1);
        opacity: 0.6;
      }

      100% {
        transform: scale(1.4);
        opacity: 0;
      }
    }

    .mic-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════════
       Transcript Area
       ═══════════════════════════════════════════ */
    #transcript {
      width: 100%;
      min-height: 90px;
      border-radius: 12px;
      border: 1px solid rgba(207, 174, 112, 0.15);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      line-height: 1.5;
      padding: 0.85rem 1rem;
      resize: vertical;
      transition: border-color 0.3s;
    }

    #transcript:focus {
      outline: none;
      border-color: var(--vu-gold);
    }

    #transcript::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    /* ═══════════════════════════════════════════
       Send Button
       ═══════════════════════════════════════════ */
    #send-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      width: 100%;
      padding: 0.85rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--vu-gold), var(--vu-gold-dark));
      color: var(--vu-black);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
    }

    #send-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    #send-btn:active {
      transform: translateY(0);
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ═══════════════════════════════════════════
       Question Banner (bot asking for info)
       ═══════════════════════════════════════════ */
    #question-banner {
      display: none;
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      background: rgba(116, 185, 255, 0.10);
      border: 1px solid rgba(116, 185, 255, 0.25);
      color: var(--info);
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.5;
      text-align: left;
      animation: fadeSlideIn 0.3s ease;
    }

    #question-banner.visible {
      display: block;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════════════
       Status Badge
       ═══════════════════════════════════════════ */
    #status {
      margin-top: 1.25rem;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      background: rgba(0, 0, 0, 0.25);
      color: var(--text-muted);
      min-height: 2.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      transition: all 0.3s ease;
      line-height: 1.4;
    }

    #status.listening {
      color: var(--vu-gold);
      background: rgba(207, 174, 112, 0.1);
    }

    #status.sending {
      color: var(--vu-gold-light);
    }

    #status.working {
      color: var(--success);
      background: rgba(78, 205, 196, 0.08);
    }

    #status.question {
      color: var(--info);
      background: rgba(116, 185, 255, 0.08);
    }

    #status.done {
      color: var(--success);
    }

    #status.error {
      color: var(--danger);
      background: rgba(255, 107, 107, 0.08);
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ═══════════════════════════════════════════
       Footer
       ═══════════════════════════════════════════ */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.68rem;
      color: rgba(154, 154, 176, 0.5);
      letter-spacing: 0.03em;
    }

    /* ═══════════════════════════════════════════
       Accessibility
       ═══════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="card" id="main-card">
    <!-- Branding -->
    <div class="brand">
      <h1>🛠️ VU Maintenance Reporter</h1>
      <p>Speak your issue — we'll handle the rest</p>
    </div>

    <div class="divider"></div>

    <!-- Microphone -->
    <div class="mic-wrap">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <button id="mic-btn" aria-label="Tap to speak">🎙️</button>
        <p class="mic-label" id="mic-label">Tap to Speak</p>
      </div>
    </div>

    <!-- Transcript -->
    <textarea id="transcript" placeholder="Your spoken issue will appear here…" rows="3"
      aria-label="Transcribed issue text"></textarea>

    <!-- Send Button -->
    <button id="send-btn" disabled>
      <span>🚀</span> Send to ReADY Bot
    </button>

    <!-- Question Banner (bot asks follow-up questions) -->
    <div id="question-banner"></div>

    <!-- Status -->
    <div id="status">Ready — tap the mic to begin</div>

    <!-- Footer -->
    <p class="footer">Vanderbilt ReADY · Voice-to-Form Demo</p>
  </div>

  <!-- ═══════════════════════════════════════════
       Voice & Fetch Logic
       ═══════════════════════════════════════════ -->
  <script>
    (() => {
      'use strict';

      // ── DOM refs ────────────────────────────
      const micBtn = document.getElementById('mic-btn');
      const micLabel = document.getElementById('mic-label');
      const transcript = document.getElementById('transcript');
      const sendBtn = document.getElementById('send-btn');
      const status = document.getElementById('status');
      const questionBanner = document.getElementById('question-banner');

      // ── State ───────────────────────────────
      let isRecording = false;
      let recognition = null;
      let pollTimer = null;
      let isAnsweringQuestion = false;

      // ── Web Speech API Setup ────────────────
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        setStatus('error', '⚠️ Speech recognition not supported. Use Chrome.');
        micBtn.disabled = true;
        return;
      }

      function createRecognition() {
        const rec = new SpeechRecognition();
        rec.lang = 'en-US';
        rec.interimResults = true;
        rec.continuous = false;
        rec.maxAlternatives = 1;

        let finalTranscript = '';

        rec.onstart = () => {
          isRecording = true;
          micBtn.classList.add('recording');
          micLabel.textContent = 'Listening…';
          setStatus('listening', '🎧 Listening — speak now…');
          finalTranscript = '';
        };

        rec.onresult = (e) => {
          let interim = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) {
              finalTranscript += t + ' ';
            } else {
              interim += t;
            }
          }
          transcript.value = (finalTranscript + interim).trim();
        };

        rec.onend = () => {
          isRecording = false;
          micBtn.classList.remove('recording');
          micLabel.textContent = 'Tap to Speak';

          const text = transcript.value.trim();
          if (text.length > 0) {
            sendBtn.disabled = false;
            setStatus('done', '✅ Got it! Review and send, or tap mic again.');
            // Auto-send after a short pause
            autoSend(text);
          } else {
            setStatus('', 'Ready — tap the mic to begin');
          }
        };

        rec.onerror = (e) => {
          isRecording = false;
          micBtn.classList.remove('recording');
          micLabel.textContent = 'Tap to Speak';

          if (e.error === 'no-speech') {
            setStatus('error', '🔇 No speech detected — try again.');
          } else if (e.error === 'not-allowed') {
            setStatus('error', '🚫 Microphone access denied.');
          } else {
            setStatus('error', `⚠️ Error: ${e.error}`);
          }
        };

        return rec;
      }

      // ── Mic Button Handler ──────────────────
      micBtn.addEventListener('click', () => {
        if (isRecording) {
          recognition.stop();
        } else {
          transcript.value = '';
          sendBtn.disabled = true;
          recognition = createRecognition();
          recognition.start();
        }
      });

      // ── Auto-send after transcription ───────
      function autoSend(text) {
        setTimeout(() => {
          if (text === transcript.value.trim()) {
            submitIssue(text);
          }
        }, 1200);
      }

      // ── Manual Send ─────────────────────────
      sendBtn.addEventListener('click', () => {
        const text = transcript.value.trim();
        if (text) submitIssue(text);
      });

      // ── Submit to Backend ───────────────────
      async function submitIssue(text) {
        sendBtn.disabled = true;
        setStatus('sending', '<span class="spinner"></span> Sending to bot…');
        hideQuestion();

        try {
          const res = await fetch('/run-bot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ issue: text }),
          });

          const data = await res.json();

          if (res.ok) {
            setStatus('working', '🤖 ' + data.message);
            // Start polling for bot questions
            startPolling();
          } else {
            setStatus('error', '⚠️ ' + (data.message || 'Something went wrong.'));
            sendBtn.disabled = false;
          }
        } catch (err) {
          setStatus('error', '⚠️ Network error — is the server running?');
          sendBtn.disabled = false;
        }
      }

      // ── Poll for bot questions ──────────────
      function startPolling() {
        stopPolling();
        pollTimer = setInterval(checkBotStatus, 1500);
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      async function checkBotStatus() {
        try {
          const res = await fetch('/bot-status');
          const data = await res.json();

          if (data.status === 'waiting' && data.question) {
            // Bot needs more info — show question and prompt user to speak
            showQuestion(data.question);
            setStatus('question', '🎙️ Tap mic to answer, then it auto-sends.');
            isAnsweringQuestion = true;
            // Clear transcript for the answer
            transcript.value = '';
            transcript.placeholder = 'Tap mic and speak your answer…';
            sendBtn.disabled = true;
          } else if (data.status === 'done') {
            stopPolling();
            hideQuestion();
            isAnsweringQuestion = false;
            transcript.placeholder = 'Your spoken issue will appear here…';
            setStatus('done', '✅ Form filled! Review in Chrome and submit manually.');
          } else if (data.status === 'filling_form') {
            hideQuestion();
            setStatus('working', '<span class="spinner"></span> 🤖 Filling out the form…');
          } else if (data.status === 'error') {
            stopPolling();
            hideQuestion();
            isAnsweringQuestion = false;
            transcript.placeholder = 'Your spoken issue will appear here…';
            setStatus('error', '⚠️ ' + (data.message || 'An error occurred.'));
            sendBtn.disabled = false;
          }
        } catch (e) {
          // Silently retry
        }
      }

      // ── Question Banner ─────────────────────
      function showQuestion(text) {
        questionBanner.textContent = text;
        questionBanner.classList.add('visible');
      }

      function hideQuestion() {
        questionBanner.classList.remove('visible');
      }

      // ── Status Helper ───────────────────────
      function setStatus(cls, html) {
        status.className = '';
        if (cls) status.classList.add(cls);
        status.innerHTML = html;
      }
    })();
  </script>
</body>

</html>
